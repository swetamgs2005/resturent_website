{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'menu/style.css' %}">
</head>
<body>
    

    
{% block content %}

<nav style="background-color: rgb(43, 202, 131);">
        <div class="logo">🍲 Mom's Tiffin Service</div>
        <div class="nav-links">
            <a class="nav-link" href="/#about">About</a>
            <a class="nav-link" href="/#menu">Menu</a>
            <a class="nav-link" href="/#pricing">Pricing</a>
            <a class="nav-link"  href="/#contact" class="btn-order">Order Now</a>
        </div>
        <div>
            <a href="{% static 'login' %}">login</a>
        </div>
    </nav>
    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <label>Username:</label>
        <input type="text" name="username" required>
        <br><br>

        <label>Password:</label>
        <input type="password" name="password" required>
        <br><br>

        <button type="submit">Login</button>
    </form>
    {% endblock %}
</body>
</html>
